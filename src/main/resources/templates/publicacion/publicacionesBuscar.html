<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Buscar Publicaciones</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="pagina">

	<div class="starter-template">
	        <h1>Hogar Ya</h1> <h2>
	            <span>Buscar Publicaciones</span>
	        </h2>
	    </div>

<form th:action="@{/publicacionesBuscar}" method="get">
	        <table border="1" style="align-self: center;">
            <tr>
                <td><label>Propiedad:</label></td>
                <td>
                    <select name="propiedadId">
                        <option value="">-- Todas --</option>
                        <option th:each="prop : ${propiedades}" 
                                th:value="${prop.id}" 
                                th:text="${prop.direccion}">Dirección</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label>Estado:</label></td>
                <td>
                    <select name="estado">
                        <option value="">-- Todos --</option>
                        <option th:each="est : ${estados}" 
                                th:value="${est}" 
                                th:text="${est}">Estado</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td><label>Precio Mín:</label></td>
                <td><input type="number" name="precioMin" step="0.01" placeholder="Ej: 50000"/></td>
            </tr>
            <tr>
                <td><label>Precio Max:</label></td>
                <td><input type="number" name="precioMax" step="0.01" placeholder="Ej: 200000"/></td>
            </tr>
        </table>

        <table class="botones">
            <tr>
                <td><button type="submit"> Filtrar</button></td>
                <td><a th:href="@{/publicacionesBuscar}" style="text-decoration: none;"><button type="button"> Limpiar</button></a></td>
                <td><a th:href="@{/publicaciones/nueva}" style="text-decoration: none;"><button type="button"> Nueva Publicación</button></a></td>
            </tr>
        </table>

        <table class="resultados" border="0" style="align-self: center;">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Propiedad</th>
                    <th>Precio Mensual</th>
                    <th>Estado</th>
                    <th></th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="pub : ${publicaciones}">
                    <td th:text="${pub.id}">1</td>
                    <td th:text="${pub.propiedad.direccion}">San Martín 1234</td>
                    <td th:text="${'$' + pub.precioMensual}">$150.000</td>
                    <td th:text="${pub.estado}">ACTIVA</td>
                    <td>
                        <a th:href="@{/publicaciones/editar(id=${pub.id})}" 
                           class="btn btn-primary">Editar</a>
                    </td>
                    <td>
                        <a th:href="@{/publicaciones/eliminar/{id}(id=${pub.id})}"
                           class="btn btn-primary"
                           onclick="return confirm('¿Seguro que desea eliminar esta publicación?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </form>
</body>
</html>
