<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Publicación</title>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body class="pagina">

    <div class="starter-template">
        <h1>Hogar Ya</h1>
        <h2>
            <span th:text="${publicacion.id != null} ? 'Editar Publicación' : 'Registrar Publicación'">Editar Publicación</span>
        </h2>
    </div>

    <div class="contenedor-formulario" style="max-width: 600px; margin: 0 auto;">
        
        <form th:action="@{/publicaciones/guardar}" method="post">
            
            <input type="hidden" name="id" th:value="${publicacion != null} ? ${publicacion.id} : ''" />

            <table class="tabla-datos" style="width: 100%; border: none;">
                <tr>
                    <td><label>Seleccionar Propiedad:</label></td>
                    <td>
                        <select name="propiedadIdForm" th:disabled="${publicacion.id != null}">										
                            <option th:each="p : ${propiedadesDisponibles}" 
                                    th:value="${p.id}" 
                                    th:text="${p.direccion}"
                                    th:selected="${publicacion.propiedad != null and p.id == publicacion.propiedad.id}">
                            </option>
                        </select>
                        <input type="hidden" name="propiedadIdForm" th:if="${publicacion.id != null}" th:value="${publicacion.propiedad.id}" />
                    </td>
                </tr>
                
                <tr>
                    <td><label>Precio Mensual ($):</label></td>
                    <td>
                        <input type="number" name="precioMensual" step="0.01" required 
                               th:value="${publicacion != null} ? ${publicacion.precioMensual} : ''" />
                    </td>
                </tr>

                <tr>
                    <td><label>Condiciones:</label></td>
                    <td>
                        <input type="text" name="condiciones" placeholder="Ej: Garantía propietaria" 
                               th:value="${publicacion != null} ? ${publicacion.condiciones} : ''" />
                    </td>
                </tr>

                <tr>
                    <td><label>Descripción:</label></td>
                    <td>
                        <textarea name="descripcion" rows="4" placeholder="Detalles de la propiedad..." 
                                  th:text="${publicacion != null} ? ${publicacion.descripcion} : ''"></textarea>
                    </td>
                </tr>

                <tr>
                    <td><label for="estado">Estado:</label></td>
                    <td>
                        <select name="estadoForm" id="estado">
                            <option value="ACTIVA" th:selected="${publicacion.estado != null and publicacion.estado.name() == 'ACTIVA'}">Activa</option>
                            <option value="PAUSADA" th:selected="${publicacion.estado != null and publicacion.estado.name() == 'PAUSADA'}">Pausada</option>
                            <option value="FINALIZADA" th:selected="${publicacion.estado != null and publicacion.estado.name() == 'FINALIZADA'}">Finalizada</option>
                        </select>
                    </td>
                </tr>
            </table>

            <div style="text-align: center; margin-top: 25px; display: flex; justify-content: center; gap: 15px;">
                <button type="submit" class="btn btn-primary" style="background-color: #005944; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-weight: bold; cursor: pointer;">
                    Aceptar
                </button>
                
                <a th:href="@{/publicacionesBuscar}" style="text-decoration: none;">
                    <button type="button" class="btn btn-secondary" style="background-color: #005944; color: white; border: none; padding: 10px 24px; border-radius: 8px; font-weight: bold; cursor: pointer;">
                        Cancelar
                    </button>
                </a>
            </div>
            
        </form>
    </div>

</body>
</html>
