<form th:action="@{/publicaciones}" method="get" style="background-color: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #ddd;">
    <h3 style="margin-top: 0;">Filtrar Publicaciones</h3>
    <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
        
        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Propiedad:</label>
            <select name="propiedadId" style="padding: 6px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="">-- Todas --</option>
                <option th:each="prop : ${propiedades}" 
                        th:value="${prop.id}" 
                        th:text="${prop.direccion}">Dirección</option>
            </select>
        </div>

        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Estado:</label>
            <select name="estado" style="padding: 6px; border-radius: 4px; border: 1px solid #ccc;">
                <option value="">-- Todos --</option>
                <option th:each="est : ${estados}" 
                        th:value="${est}" 
                        th:text="${est}">Estado</option>
            </select>
        </div>

        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Precio Mín:</label>
            <input type="number" name="precioMin" step="0.01" placeholder="Ej: 50000" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc; width: 100px;"/>
        </div>

        <div>
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Precio Max:</label>
            <input type="number" name="precioMax" step="0.01" placeholder="Ej: 200000" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc; width: 100px;"/>
        </div>

        <div>
            <button type="submit" style="background-color: #007bff; color: white; padding: 7px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">🔍 Filtrar</button>
            <a th:href="@{/publicaciones}" style="background-color: #6c757d; color: white; padding: 7px 15px; border-radius: 4px; text-decoration: none; font-size: 14px; font-weight: bold; margin-left: 5px;">🔄 Limpiar</a>
        </div>
    </div>
</form>

<div style="margin-bottom: 20px;">
    <a th:href="@{/publicaciones/nueva}" class="btn-nuevo" style="text-decoration: none; background-color: #28a745; color: white; padding: 10px 15px; border-radius: 4px; font-weight: bold; display: inline-block;">➕ Nueva Publicación</a>
</div>

<table border="1" style="width: 100%; border-collapse: collapse;">
    <thead>
        <tr style="background-color: #f2f2f2;">
            <th>ID</th>
            <th>Propiedad</th>
            <th>Precio Mensual</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="pub : ${publicaciones}">
            <td th:text="${pub.id}">1</td>
            <td th:text="${pub.propiedad.direccion}">San Martín 1234</td>
            <td th:text="${'$' + pub.precioMensual}">$150.000</td>
            <td th:text="${pub.estado}">ACTIVA</td>
            <td>
                <a th:href="@{/publicaciones/editar(id=${pub.id})}" class="btn btn-warning" style="padding: 4px 8px; background-color: #ffc107; color: black; text-decoration: none; border-radius: 4px; font-size: 14px; margin-right: 5px;">Editar</a>
                <a th:href="@{/publicaciones/eliminar/{id}(id=${pub.id})}" class="btn btn-danger" style="padding: 4px 8px; background-color: #dc3545; color: white; text-decoration: none; border-radius: 4px; font-size: 14px;" onclick="return confirm('¿Seguro que desea eliminar esta publicación?')">Eliminar</a>
            </td>
        </tr>
    </tbody>
</table>
